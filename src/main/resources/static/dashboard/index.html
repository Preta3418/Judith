<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 — JUDITH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="dash-shell">

    <nav class="dash-nav">
        <div class="dash-nav-inner">
            <a href="/" class="dash-logo">
                <img src="/images/logo-symbol-light.png" alt="JUDITH">
                <span class="dash-logo-text">JUDITH</span>
            </a>
            <div class="dash-nav-tabs">
                <a href="/dashboard/index.html" class="dash-tab active">홈</a>
                <a href="/dashboard/notifications.html" class="dash-tab">공지사항</a>
                <a href="/dashboard/scripts.html" class="dash-tab">대본</a>
            </div>
            <div class="dash-nav-right">
                <select class="dash-season-select" id="seasonSelector"></select>
                <div class="dash-avatar" id="userAvatar">U</div>
                <span class="dash-user-name" id="userName"></span>
                <button class="dash-btn-logout" onclick="logout()">로그아웃</button>
            </div>
        </div>
    </nav>

    <main class="dash-main" id="pageContainer">
        <div class="loading"><div class="spinner"></div></div>
    </main>

</div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
<script>
async function loadPageContent() {
    const container = document.getElementById('pageContainer');
    const name = getCurrentUserName();

    container.innerHTML = `
        <div class="dash-page-header">
            <div class="dash-greeting">${escHtml(name)}님, 안녕하세요 👋</div>
            <div class="dash-subtitle">${escHtml(currentSeason.seasonName)}</div>
        </div>

        <div class="dash-stats">
            <a href="${dashboardUrl('notifications.html')}" class="dash-stat">
                <div class="dash-stat-value" id="statUnread">-</div>
                <div class="dash-stat-label">읽지 않은 공지</div>
            </a>
            <a href="${dashboardUrl('scripts.html')}" class="dash-stat">
                <div class="dash-stat-value" id="statScripts">-</div>
                <div class="dash-stat-label">대본 파일</div>
            </a>
            <div class="dash-stat">
                <div class="dash-stat-value" id="statMembers">-</div>
                <div class="dash-stat-label">시즌 부원</div>
            </div>
        </div>

        <div class="dash-card">
            <div class="dash-card-header">
                <span class="dash-card-title">시즌 정보</span>
                ${statusBadge(currentSeason.status)}
            </div>
            <div class="dash-season-header">
                <span class="dash-season-name">${escHtml(currentSeason.seasonName)}</span>
            </div>
            <div class="dash-info-grid">
                <div class="dash-info-item">
                    <span class="dash-info-label">시작일</span>
                    <span class="dash-info-value">${fmtDate(currentSeason.startDate)}</span>
                </div>
                <div class="dash-info-item">
                    <span class="dash-info-label">공연일</span>
                    <span class="dash-info-value">${fmtDate(currentSeason.eventDate)}</span>
                </div>
                <div class="dash-info-item">
                    <span class="dash-info-label">종료일</span>
                    <span class="dash-info-value">${fmtDate(currentSeason.endDate)}</span>
                </div>
            </div>
        </div>

        <div class="dash-card">
            <div class="dash-card-header">
                <span class="dash-card-title">내 역할</span>
            </div>
            <div class="dash-roles">
                ${(currentSeason.myRoles && currentSeason.myRoles.length > 0)
                    ? [...currentSeason.myRoles].map(r => `<span class="badge badge-primary">${escHtml(getRoleLabel(r))}</span>`).join('')
                    : '<span class="text-muted" style="font-size:0.875rem;">배정된 역할이 없습니다</span>'
                }
            </div>
        </div>

        <div class="dash-card">
            <div class="dash-card-header">
                <span class="dash-card-title">부원 목록</span>
            </div>
            <div class="dash-member-grid" id="memberGrid">
                <div class="spinner"></div>
            </div>
        </div>
    `;

    loadUnreadCount();
    loadScriptCount();
    loadMembers();
}

async function loadUnreadCount() {
    try {
        const count = await api(`/api/notifications/${getCurrentUserId()}/unread/count`);
        const el = document.getElementById('statUnread');
        if (el) el.textContent = count ?? 0;
    } catch(e) {
        const el = document.getElementById('statUnread');
        if (el) el.textContent = '0';
    }
}

async function loadScriptCount() {
    try {
        const scripts = await api(`/api/dashboard/seasons/${currentSeasonId}/scripts`);
        const el = document.getElementById('statScripts');
        if (el) el.textContent = scripts ? scripts.length : 0;
    } catch(e) {
        const el = document.getElementById('statScripts');
        if (el) el.textContent = '0';
    }
}

async function loadMembers() {
    const grid = document.getElementById('memberGrid');
    try {
        const members = await api(`/api/public/seasons/${currentSeasonId}/users`) || [];
        const el = document.getElementById('statMembers');
        if (el) el.textContent = members.length;

        if (members.length === 0) {
            grid.innerHTML = '<p style="color:var(--text-muted);font-size:0.875rem;">부원이 없습니다.</p>';
            return;
        }

        grid.innerHTML = members.map(m => `
            <div class="dash-member">
                <div class="dash-member-name">${escHtml(m.userName)}</div>
                <div class="dash-member-role">${escHtml(formatRoles(m.roles ? [...m.roles] : []))}</div>
            </div>
        `).join('');
    } catch(e) {
        if (grid) grid.innerHTML = '<p style="color:var(--text-muted);font-size:0.875rem;">부원 목록을 불러올 수 없습니다.</p>';
    }
}
</script>
</body>
</html>
