<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 — JUDITH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="dash-shell">

    <nav class="dash-nav">
        <div class="dash-nav-inner">
            <a href="/" class="dash-logo">
                <img src="/images/logo-symbol-light.png" alt="JUDITH">
                <span class="dash-logo-text">JUDITH</span>
            </a>
            <div class="dash-nav-tabs">
                <a href="/dashboard/index.html" class="dash-tab">홈</a>
                <a href="/dashboard/notifications.html" class="dash-tab active">공지사항</a>
                <a href="/dashboard/scripts.html" class="dash-tab">대본</a>
            </div>
            <div class="dash-nav-right">
                <select class="dash-season-select" id="seasonSelector"></select>
                <div class="dash-avatar" id="userAvatar">U</div>
                <span class="dash-user-name" id="userName"></span>
                <button class="dash-btn-logout" onclick="logout()">로그아웃</button>
            </div>
        </div>
    </nav>

    <main class="dash-main" id="pageContainer">
        <div class="loading"><div class="spinner"></div></div>
    </main>

</div>

<!-- Create Notification Modal (admin only) -->
<div class="modal-overlay" id="createNotifModal">
    <div class="modal" style="max-width:500px;">
        <div class="modal-header">
            <h3 class="modal-title">공지사항 작성</h3>
            <button class="modal-close" onclick="closeModal('createNotifModal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">제목</label>
                <input type="text" class="form-input" id="notifTitle" placeholder="공지 제목">
            </div>
            <div class="form-group">
                <label class="form-label">내용</label>
                <textarea class="form-input" id="notifContent" rows="6" placeholder="공지 내용" style="resize:vertical;"></textarea>
            </div>
            <div id="notifError" class="error-message" style="display:none;"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('createNotifModal')">취소</button>
            <button class="btn btn-primary" id="notifSubmitBtn" onclick="submitNotification()">게시</button>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
<script>
async function loadPageContent() {
    const container = document.getElementById('pageContainer');
    container.innerHTML = `
        <div class="dash-page-header">
            <div class="dash-greeting">공지사항</div>
            <div class="dash-subtitle">${escHtml(currentSeason.seasonName)}</div>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px;">
            <button class="btn btn-secondary btn-sm" onclick="markAllRead()">전체 읽음</button>
            ${isAdmin() ? `<button class="btn btn-primary btn-sm" onclick="openModal('createNotifModal')">+ 공지 작성</button>` : ''}
        </div>

        <div class="dash-notifs" id="notifList">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    `;

    await loadNotifications();
}

async function loadNotifications() {
    const list = document.getElementById('notifList');
    try {
        const items = await api(`/api/dashboard/seasons/${currentSeasonId}/notifications`) || [];

        if (items.length === 0) {
            list.innerHTML = `<div class="dash-empty">
                <div class="dash-empty-icon">&#x1F514;</div>
                <p class="dash-empty-text">공지사항이 없습니다</p>
            </div>`;
            return;
        }

        list.innerHTML = items.map(n => `
            <div class="dash-notif ${n.read ? '' : 'unread'}" id="notif-${n.userNotificationId}"
                 onclick="toggleNotif(${n.userNotificationId})">
                <div class="dash-notif-header">
                    <div class="dash-notif-title-row">
                        ${n.read ? '' : '<span class="dash-unread-dot"></span>'}
                        <span class="dash-notif-title">${escHtml(n.title)}</span>
                    </div>
                    <span class="dash-notif-date">${fmtDateTime(n.createdAt)}</span>
                </div>
                <div class="dash-notif-body">${escHtml(n.content)}</div>
            </div>
        `).join('');
    } catch(e) {
        list.innerHTML = '<div class="alert alert-danger">공지사항을 불러올 수 없습니다.</div>';
    }
}

function toggleNotif(notifId) {
    const item = document.getElementById(`notif-${notifId}`);
    if (!item) return;
    const expanding = !item.classList.contains('expanded');
    item.classList.toggle('expanded', expanding);

    if (expanding && item.classList.contains('unread')) {
        api(`/api/notifications/${notifId}/read`, { method: 'POST' }).catch(() => {});
        item.classList.remove('unread');
        item.querySelector('.dash-unread-dot')?.remove();
    }
}

async function markAllRead() {
    try {
        await api(`/api/notifications/${getCurrentUserId()}/read-all`, { method: 'POST' });
        showToast('모두 읽음으로 표시했습니다', 'success');
        await loadNotifications();
    } catch(e) {
        showToast('처리 중 오류가 발생했습니다', 'error');
    }
}

async function submitNotification() {
    const title = document.getElementById('notifTitle').value.trim();
    const content = document.getElementById('notifContent').value.trim();
    const errEl = document.getElementById('notifError');
    const btn = document.getElementById('notifSubmitBtn');

    errEl.style.display = 'none';
    if (!title || !content) {
        errEl.textContent = '제목과 내용을 모두 입력해주세요.';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = '게시 중...';
    try {
        await api(`/api/admin/seasons/${currentSeasonId}/notifications`, {
            method: 'POST',
            body: JSON.stringify({ title, content })
        });
        closeModal('createNotifModal');
        document.getElementById('notifTitle').value = '';
        document.getElementById('notifContent').value = '';
        showToast('공지사항이 게시되었습니다', 'success');
        await loadNotifications();
    } catch(e) {
        errEl.textContent = e.message || '오류가 발생했습니다.';
        errEl.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = '게시';
    }
}
</script>
</body>
</html>
